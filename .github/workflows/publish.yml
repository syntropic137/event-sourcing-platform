name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"

# Least-privilege default — jobs declare write access explicitly.
permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME=${{ github.event.release.tag_name }}
          else
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (tag: $TAG_NAME)"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Verify version consistency
        run: |
          python3 scripts/bump_version.py --check
          PLATFORM_VERSION=$(python3 scripts/bump_version.py --current)
          RELEASE_VERSION="${{ steps.version.outputs.version }}"
          echo "Platform version: $PLATFORM_VERSION"
          echo "Release version: $RELEASE_VERSION"
          if [ "$PLATFORM_VERSION" != "$RELEASE_VERSION" ]; then
            echo "❌ Version mismatch! Platform is $PLATFORM_VERSION but release tag is $RELEASE_VERSION"
            echo "Run: make bump-version VERSION=$RELEASE_VERSION"
            exit 1
          fi
          echo "✅ Versions match!"

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install Protocol Buffers compiler
        run: |
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          curl -Lo protoc.zip "$PB_REL/download/v27.3/protoc-27.3-linux-x86_64.zip"
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip
          protoc --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd event-sourcing/typescript
          pnpm run test

      - name: Run linter
        run: |
          cd event-sourcing/typescript
          pnpm run lint

      - name: Build package
        run: |
          cd event-sourcing/typescript
          pnpm run build

      - name: Verify build output
        run: |
          if [ ! -d "event-sourcing/typescript/dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          if [ ! -f "event-sourcing/typescript/dist/index.js" ]; then
            echo "❌ Build failed - index.js not found"
            exit 1
          fi
          echo "✅ Build output verified"

  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@syntropic137"
          cache: "pnpm"

      - name: Install Protocol Buffers compiler
        run: |
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          curl -Lo protoc.zip "$PB_REL/download/v27.3/protoc-27.3-linux-x86_64.zip"
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip
          protoc --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: |
          cd event-sourcing/typescript
          pnpm run build

      - name: Publish to GitHub Packages
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          cd event-sourcing/typescript
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run - Package ready
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: |
          echo "🚀 Dry run mode - Package would be published"
          echo "Version: ${{ needs.validate.outputs.version }}"
          echo "Package: @syntropic137/event-sourcing-typescript"

      - name: Create release notes
        if: ${{ github.event_name == 'release' && github.event.inputs.dry-run != 'true' }}
        run: |
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Package:** @syntropic137/event-sourcing-typescript" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ **Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Tag:** ${{ needs.validate.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install @syntropic137/event-sourcing-typescript@${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  verify-publication:
    name: Verify Publication
    runs-on: ubuntu-latest
    needs: [validate, publish]
    if: ${{ github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Wait for package to be available
        run: sleep 30

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@syntropic137"

      - name: Verify package is accessible
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "@syntropic137:registry=https://npm.pkg.github.com" >> ~/.npmrc

          npm view @syntropic137/event-sourcing-typescript@${{ needs.validate.outputs.version }} || {
            echo "⚠️ Package not immediately available (may take a few minutes)"
            exit 0
          }
          echo "✅ Package successfully published and accessible"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure package is public
        run: |
          # GitHub Packages defaults to private for org repos.
          # Set to public so Syntropic137 and other consumers can pull without auth.
          gh api \
            --method PUT \
            "orgs/syntropic137/packages/npm/event-sourcing-platform%2Ftypescript/visibility" \
            -f visibility=public \
            2>/dev/null || echo "⚠️ Could not set visibility (may already be public or require admin)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
