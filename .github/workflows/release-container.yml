# =============================================================================
# Release Container — Build, Sign, Publish Event Store to GHCR
# =============================================================================
#
# Trigger: GitHub release published (or manual dispatch for testing).
#
# Pipeline:
#   1. Build multi-arch event-store image (linux/amd64 + linux/arm64)
#   2. Push to ghcr.io/syntropic137/event-store with version tags
#   3. Sign with cosign (keyless OIDC), SBOM via BuildKit
#
# This allows syntropic137 to reference a pre-built image instead of
# building the Rust binary from source on every release (~15-20 min saved).
#
# Security:
#   - All actions SHA-pinned (ISS-259)
#   - cosign keyless signing (Sigstore OIDC — no secrets to manage)
#   - SBOM generated by BuildKit
# =============================================================================

name: Release Container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to use (e.g. v0.2.2). Defaults to 'dev' for testing."
        required: false
        default: "dev"
      dry_run:
        description: "Dry run — build but don't push or sign"
        type: boolean
        default: false

concurrency:
  group: release-container-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress release

# ISS-259: Least-privilege default. Jobs declare their own elevated permissions.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: syntropic137/event-store

jobs:
  # ===========================================================================
  # BUILD + PUSH — Multi-arch event-store image
  # ===========================================================================

  build-push:
    name: Build & Push Event Store
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write       # Push to GHCR
      id-token: write       # cosign keyless signing (Sigstore OIDC)

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # -----------------------------------------------------------------------
      # Determine version
      # -----------------------------------------------------------------------
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version || 'dev' }}"
          fi
          # Strip 'v' prefix for semver-only contexts
          SEMVER="${VERSION#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

          # Only emit major_minor when version is valid semver (X.Y.Z)
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            MAJOR_MINOR="v$(echo "$SEMVER" | cut -d. -f1,2)"
            echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          fi

          # Only tag 'latest' for valid stable semver releases
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Docker Buildx (multi-arch support)
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # -----------------------------------------------------------------------
      # QEMU (cross-platform emulation for multi-arch builds)
      # -----------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: linux/amd64,linux/arm64

      # -----------------------------------------------------------------------
      # GHCR login
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Docker metadata (tags + labels)
      # -----------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Version tag: v0.2.2
            type=raw,value=${{ steps.version.outputs.version }}
            # Major.minor tag: v0.2 (only for semver releases)
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.major_minor != '' }}
            # Latest tag (only for stable releases)
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}
          labels: |
            org.opencontainers.image.title=event-store
            org.opencontainers.image.description=Event Sourcing Platform — gRPC Event Store
            org.opencontainers.image.vendor=Syntropic137
            org.opencontainers.image.source=https://github.com/syntropic137/event-sourcing-platform

      # -----------------------------------------------------------------------
      # Build + Push multi-arch image to GHCR
      # -----------------------------------------------------------------------
      - name: Build and push multi-arch image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: event-store/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true  # SLSA provenance attestation
          sbom: true        # Attach SBOM via BuildKit

      # -----------------------------------------------------------------------
      # Sign with cosign (keyless, OIDC-based via Sigstore)
      # -----------------------------------------------------------------------
      - name: Install cosign
        if: ${{ !inputs.dry_run }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        if: ${{ !inputs.dry_run }}
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Signing ${IMAGE}@${DIGEST}"
          cosign sign "${IMAGE}@${DIGEST}"

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Write job summary
        run: |
          echo "## Event Store Container: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "> **Dry run** — image was built but not pushed or signed." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ steps.push.outputs.digest }}" ]]; then
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Usage" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ steps.push.outputs.digest }}" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Verify Signature" >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
