# =============================================================================
# Release Container — Build, Sign, Publish Event Store to GHCR
# =============================================================================
#
# Trigger: GitHub release published (or manual dispatch for testing).
#
# Pipeline:
#   1. Prepare — compute version tags and Docker metadata
#   2. Build  — per-arch native builds (amd64 + arm64), push by digest
#   3. Merge  — assemble multi-arch manifest, sign with cosign
#
# Performance: Native runners per architecture (no QEMU emulation).
# Dockerfile uses cargo-chef for dependency layer caching.
#
# Security:
#   - All actions SHA-pinned (ISS-259)
#   - cosign keyless signing (Sigstore OIDC — no secrets to manage)
#   - SBOM generated by BuildKit
# =============================================================================

name: Release Container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to use (e.g. v0.2.2). Defaults to 'dev' for testing."
        required: false
        default: "dev"
      dry_run:
        description: "Dry run — build but don't push or sign"
        type: boolean
        default: false

concurrency:
  group: release-container-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress release

# ISS-259: Least-privilege default. Jobs declare their own elevated permissions.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: syntropic137/event-store

jobs:
  # ===========================================================================
  # PREPARE — Compute version metadata and Docker tags
  # ===========================================================================

  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
      major_minor: ${{ steps.version.outputs.major_minor }}
      is_stable: ${{ steps.version.outputs.is_stable }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version || 'dev' }}"
          fi
          # Strip 'v' prefix for semver-only contexts
          SEMVER="${VERSION#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

          # Only emit major_minor when version is valid semver (X.Y.Z)
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            MAJOR_MINOR="v$(echo "$SEMVER" | cut -d. -f1,2)"
            echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          fi

          # Only tag 'latest' for valid stable semver releases
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Version tag: v0.2.2
            type=raw,value=${{ steps.version.outputs.version }}
            # Major.minor tag: v0.2 (only for semver releases)
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.major_minor != '' }}
            # Latest tag (only for stable releases)
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}
          labels: |
            org.opencontainers.image.title=event-store
            org.opencontainers.image.description=Event Sourcing Platform — gRPC Event Store
            org.opencontainers.image.vendor=Syntropic137
            org.opencontainers.image.source=https://github.com/syntropic137/event-sourcing-platform

  # ===========================================================================
  # BUILD — Per-arch native builds (no QEMU emulation)
  # ===========================================================================

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-latest-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute platform slug
        id: slug
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: event-store/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ !inputs.dry_run }}
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=gha,scope=build-${{ steps.slug.outputs.slug }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.slug.outputs.slug }}
          provenance: true
          sbom: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

      - name: Export digest
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Write dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry Run — ${{ matrix.platform }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Image was built but not pushed." >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # MERGE — Assemble multi-arch manifest, sign, publish summary
  # ===========================================================================

  merge:
    name: Merge & Sign
    needs: [prepare, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing (Sigstore OIDC)

    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
      version: ${{ needs.prepare.outputs.version }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Build --tag flags from metadata
          TAG_ARGS=""
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS="$TAG_ARGS --tag $tag"
          done <<< "${{ needs.prepare.outputs.tags }}"

          # Build source list from digests
          SOURCES=""
          for digest_file in /tmp/digests/*; do
            SOURCES="$SOURCES ${IMAGE}@sha256:$(basename "$digest_file")"
          done

          # shellcheck disable=SC2086
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Inspect manifest
        id: inspect
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # Sign with cosign (keyless, OIDC-based via Sigstore)
      # -------------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.inspect.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Signing ${IMAGE}@${DIGEST}"
          cosign sign "${IMAGE}@${DIGEST}"

      # -------------------------------------------------------------------
      # Summary
      # -------------------------------------------------------------------
      - name: Write job summary
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          DIGEST="${{ steps.inspect.outputs.digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          echo "## Event Store Container: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Usage" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${IMAGE}:${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Verify Signature" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify ${IMAGE}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
