# Auto-merge non-major dependabot PRs after CI passes, with a 7-day
# supply chain hold. The age check prevents auto-merging packages that
# were published very recently — compromised releases (e.g. xz-utils)
# are typically caught and yanked within the first few days.

name: Dependabot Auto-Merge

on: pull_request_target

# Least-privilege default; write scoped to the job that needs it.
permissions:
  contents: read

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Supply chain protection: only auto-merge packages that have been
      # published for at least 7 days. This gives the community time to
      # detect and report compromised releases before we pull them in.
      # Fails closed — if we can't determine the age, we skip auto-merge.
      - name: Check package age (7-day supply chain hold)
        id: age-check
        run: |
          UPDATED_AT="${{ steps.metadata.outputs.updated-at }}"

          if [ -z "$UPDATED_AT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ No updated-at timestamp available — skipping auto-merge (fail closed)"
            exit 0
          fi

          UPDATED_EPOCH=$(date -d "$UPDATED_AT" +%s 2>/dev/null) || {
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Could not parse timestamp '$UPDATED_AT' — skipping auto-merge (fail closed)"
            exit 0
          }

          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - UPDATED_EPOCH) / 86400 ))
          echo "Package updated $AGE_DAYS days ago"

          if [ "$AGE_DAYS" -lt 7 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏳ Skipping auto-merge — package is only $AGE_DAYS days old (minimum: 7)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✅ Package is $AGE_DAYS days old — safe to auto-merge"
          fi

      - name: Auto-merge patch and minor updates
        if: |
          steps.metadata.outputs.update-type != 'version-update:semver-major'
          && steps.age-check.outputs.skip != 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
