name: Release Gate

# Runs when a PR targets the `release` branch.
# All checks must pass before the PR can be merged.

on:
  pull_request:
    branches: [release]

permissions:
  contents: read

jobs:
  version-check:
    name: Version Consistency & Bump Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Need full history to compare with release branch

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validate version consistency
        run: python3 scripts/bump_version.py --check

      - name: Validate version is bumped
        run: python3 scripts/bump_version.py --check-bumped

  release-notes:
    name: Release Notes Check
    runs-on: ubuntu-latest

    steps:
      - name: Check PR body has release notes
        run: |
          BODY_LENGTH=$(echo "${{ github.event.pull_request.body }}" | wc -c)
          if [ "$BODY_LENGTH" -lt 20 ]; then
            echo "❌ PR body must contain release notes (at least 20 characters)"
            exit 1
          fi
          echo "✅ Release notes present ($BODY_LENGTH characters)"

  ci-check:
    name: Full CI Suite
    uses: ./.github/workflows/ci.yml

  docker-dry-run:
    name: Docker Build (dry run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Build event-store image (no push)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f event-store/Dockerfile \
            --output type=cacheonly \
            .
          echo "✅ Docker image builds successfully"

  gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: [version-check, release-notes, ci-check, docker-dry-run]
    if: always()

    steps:
      - name: Check all gates passed
        run: |
          echo "Version Check: ${{ needs.version-check.result }}"
          echo "Release Notes: ${{ needs.release-notes.result }}"
          echo "CI Check: ${{ needs.ci-check.result }}"
          echo "Docker Dry Run: ${{ needs.docker-dry-run.result }}"

          if [ "${{ needs.version-check.result }}" != "success" ] || \
             [ "${{ needs.release-notes.result }}" != "success" ] || \
             [ "${{ needs.ci-check.result }}" != "success" ] || \
             [ "${{ needs.docker-dry-run.result }}" != "success" ]; then
            echo "❌ Release gate failed — one or more checks did not pass"
            exit 1
          fi
          echo "✅ All release gates passed"
