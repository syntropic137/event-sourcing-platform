name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # sccache: Caches individual compilation units across ALL jobs and workflows.
  # Requires RUSTC_WRAPPER to intercept rustc calls. Uses GitHub Actions cache backend.
  # See: https://github.com/mozilla-actions/sccache-action
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  rust_event_store_fast:
    name: event-store • qa-fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # rust-cache: Caches cargo registry, git deps, and target directory PER JOB.
      # Complements sccache - rust-cache handles dependencies, sccache handles compilation.
      # Both together provide optimal caching: rust-cache for cold starts, sccache for incremental.
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "event-store -> target"
          shared-key: "event-store"
          cache-targets: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: QA fast
        run: make -C event-store qa-fast

  rust_event_store_full:
    name: event-store • qa-full + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Keep independent so it runs in parallel with other jobs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "event-store -> target"
          shared-key: "event-store"
          cache-targets: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Coverage setup
        run: make -C event-store cov-setup

      - name: QA full
        run: make -C event-store qa-full
        timeout-minutes: 10
        env:
          # Testcontainers configuration for CI
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_CHECKS_DISABLE: true
          # Reduce testcontainers startup time
          TESTCONTAINERS_WAIT_STRATEGY_TIMEOUT: 60s

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: event-store-coverage
          path: |
            event-store/coverage/lcov.info
            event-store/coverage/html

  rust_sdk_fast:
    name: SDK (Rust) • qa-fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "event-sourcing/rust -> target"
          shared-key: "event-sourcing-rust"
          cache-targets: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: QA fast
        run: make -C event-sourcing/rust qa-fast

  ts_sdk:
    name: SDK (TypeScript) • qa + tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Setup protoc
        run: |
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          curl -Lo protoc.zip "$PB_REL/download/v27.3/protoc-27.3-linux-x86_64.zip"
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip
          protoc --version

      - name: Cache generated protobuf files
        uses: actions/cache@v4
        with:
          path: |
            event-store/sdks/sdk-ts/src/gen
          key: protobuf-gen-${{ runner.os }}-${{ hashFiles('event-store/eventstore-proto/proto/**/*.proto') }}
          restore-keys: |
            protobuf-gen-${{ runner.os }}-

      - name: Cache TypeScript build outputs
        uses: actions/cache@v4
        with:
          path: |
            event-sourcing/typescript/dist
            event-sourcing/typescript/tsconfig.tsbuildinfo
            event-store/sdks/sdk-ts/dist
            examples/*/dist
            node_modules/.cache
            .turbo
          key: ts-build-${{ runner.os }}-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml', '**/tsconfig*.json', 'turbo.json') }}-${{ hashFiles('event-sourcing/typescript/src/**/*.ts', 'event-store/sdks/sdk-ts/src/**/*.ts', 'examples/*/src/**/*.ts') }}
          restore-keys: |
            ts-build-${{ runner.os }}-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml', '**/tsconfig*.json', 'turbo.json') }}-
            ts-build-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript SDK qa-fast (lint + type-check)
        run: make -C event-sourcing/typescript qa-fast

      - name: TypeScript SDK tests
        run: pnpm --filter "@neuralempowerment/event-sourcing-typescript" run test

  python_sdk_fast:
    name: SDK (Python) • qa-fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "event-sourcing/python/uv.lock"

      - name: Python SDK QA
        run: make -C event-sourcing/python qa

  examples_test:
    name: Examples • build & smoke test
    runs-on: ubuntu-latest
    needs: ts_sdk # Examples depend on TypeScript SDK
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Setup protoc
        run: |
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          curl -Lo protoc.zip "$PB_REL/download/v27.3/protoc-27.3-linux-x86_64.zip"
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip
          protoc --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build examples
        run: |
          for example in examples/001-basic-store-ts examples/002-simple-aggregate-ts examples/003-multiple-aggregates-ts examples/004-cqrs-patterns-ts examples/005-projections-ts examples/006-event-bus-ts; do
            if [ -d "$example" ]; then
              echo "Building $example..."
              (cd $example && pnpm run build) || true
            fi
          done

      - name: Smoke test example
        run: |
          cd examples/002-simple-aggregate-ts
          timeout 10s pnpm start -- --memory || exit 0

  summary:
    name: QA Summary
    runs-on: ubuntu-latest
    needs:
      - rust_event_store_fast
      - rust_event_store_full
      - rust_sdk_fast
      - ts_sdk
      - python_sdk_fast
      - examples_test
    if: always()
    steps:
      - name: Write job results summary
        run: |
          {
            echo "## QA Summary";
            echo "";
            echo "| Component | Status |";
            echo "|-----------|--------|";
            echo "| event-store (qa-fast) | ${{ needs.rust_event_store_fast.result }} |";
            echo "| event-store (qa-full + coverage) | ${{ needs.rust_event_store_full.result }} |";
            echo "| SDK Rust (qa-fast) | ${{ needs.rust_sdk_fast.result }} |";
            echo "| SDK TypeScript (qa + tests) | ${{ needs.ts_sdk.result }} |";
            echo "| SDK Python (qa-fast) | ${{ needs.python_sdk_fast.result }} |";
            echo "| Examples (build + smoke) | ${{ needs.examples_test.result }} |";
          } >> "$GITHUB_STEP_SUMMARY"
